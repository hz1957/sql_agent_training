dry_run: false

model:
  backend: hf
  path: data/models/Qwen2.5-Coder-0.5B-Instruct

tokenizer:
  kind: hf

data:
  data_dir: data/spider
  train_file: train_spider.json
  validation_file: dev.json

rollout:
  n: 4
  max_turns: 3
  max_prompt_length: 2048
  max_response_length: 128
  temperature: 0.7
  top_p: 0.95

output:
  include_text: true
  checkpoint_dir: artifacts/checkpoints/grpo_qwen25_coder_05b

training:
  seed: 0
  device: auto
  max_steps: 1000
  update_epochs: 4
  task_batch_size: 8
  learning_rate: 0.000001
  clip_epsilon: 0.2
  kl_beta: 0.02
  max_grad_norm: 1.0
  save_every_steps: 100
