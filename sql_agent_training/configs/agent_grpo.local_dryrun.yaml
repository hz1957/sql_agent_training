dry_run: true

model:
  path: Qwen/Qwen2.5-Coder-0.5B-Instruct
  sft_checkpoint: null

tokenizer:
  kind: whitespace

data:
  data_dir: data/spider
  train_file: train_spider.json
  validation_file: dev.json

rollout:
  n: 2
  max_turns: 1
  temperature: 0.7
  max_prompt_length: 1024
  max_response_length: 256

verl:
  default_agent_loop: sql_agent
  agent_loop_config_path: configs/verl_sql_agent_loop.yaml
  train_parquet: artifacts/verl/spider_train_dryrun.parquet
  val_parquet: artifacts/verl/spider_val_dryrun.parquet
  train_limit: 1
  val_limit: 1
  train_batch_size: 1
  val_batch_size: 1
  total_training_steps: 1
  n_gpus_per_node: 1
  tensor_model_parallel_size: 1
  ppo_mini_batch_size: 1
  ppo_micro_batch_size_per_gpu: 1
  rollout_name: vllm
  agent_num_workers: 1

algorithm:
  adv_estimator: grpo
  use_kl_in_reward: false

output:
  checkpoint_dir: artifacts/checkpoints/grpo_dryrun
  log_dir: logs
