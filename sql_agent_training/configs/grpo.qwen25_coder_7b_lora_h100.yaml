dry_run: false

model:
  backend: hf
  path: data/models/Qwen2.5-Coder-7B-Instruct
  adapter_path: artifacts/checkpoints/sft_qwen25_coder_7b_lora_a100/20260713_024030
  torch_dtype: bf16

tokenizer:
  kind: hf

data:
  data_dir: data/spider
  train_file: train_spider.json
  validation_file: dev.json

rollout:
  n: 4
  max_turns: 3
  max_prompt_length: 2048
  max_response_length: 256
  temperature: 0.7
  top_p: 0.95

output:
  include_text: true
  checkpoint_dir: artifacts/checkpoints/grpo_qwen25_coder_7b_lora_h100

training:
  seed: 0
  device: cuda
  max_steps: 500
  update_epochs: 4
  task_batch_size: 4
  learning_rate: 0.000001
  clip_epsilon: 0.2
  kl_beta: 0.02
  max_grad_norm: 1.0
  logprob_micro_batch_size: 1
  save_every_steps: 25
