dry_run: true

model:
  backend: tiny
  hidden_size: 32

tokenizer:
  kind: whitespace

rollout:
  n: 2
  max_turns: 1
  scripted_responses:
    - SELECT COUNT(*) FROM Singer
    - SELECT Name FROM Singer
  max_prompt_length: 1024
  max_response_length: 256

output:
  rollouts_jsonl: artifacts/grpo/rollouts.local_dryrun.jsonl
  checkpoint_dir: artifacts/checkpoints/grpo_tiny
  metrics_json: artifacts/checkpoints/grpo_tiny/metrics.json

training:
  seed: 0
  device: auto
  max_steps: 2
  learning_rate: 0.001
  clip_epsilon: 0.2
  kl_beta: 0.02
  max_grad_norm: 1.0
