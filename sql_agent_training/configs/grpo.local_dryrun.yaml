dry_run: true

model:
  backend: tiny
  hidden_size: 32

tokenizer:
  kind: whitespace

data:
  data_dir: data/spider
  train_file: train_spider.json
  validation_file: dev.json

rollout:
  n: 2
  max_turns: 1
  scripted_responses:
    - SELECT COUNT(*) FROM Singer
    - SELECT Name FROM Singer
  max_prompt_length: 1024
  max_response_length: 256

output:
  include_text: true
  checkpoint_dir: artifacts/checkpoints/grpo_tiny

training:
  seed: 0
  device: auto
  max_steps: 1
  update_epochs: 1
  learning_rate: 0.001
  clip_epsilon: 0.2
  kl_beta: 0.02
  max_grad_norm: 1.0
