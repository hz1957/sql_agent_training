model:
  path: data/models/Qwen2.5-Coder-0.5B-Instruct

tokenizer:
  kind: hf

data:
  data_dir: data/spider
  train_file: train_spider.json
  validation_file: dev.json

output:
  sft_jsonl: artifacts/sft/local_smoke_train.jsonl
  checkpoint_dir: artifacts/checkpoints/sft_local_smoke
  predictions_jsonl: artifacts/eval/sft_local_smoke_model_predictions.jsonl

training:
  max_prompt_length: 512
  max_response_length: 64
  max_train_samples: 2
  max_steps: 1
  learning_rate: 0.00002
  num_train_epochs: 1
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 1
  logging_steps: 1
  save_steps: 1
  bf16: false
  fp16: false
  report_to: none
